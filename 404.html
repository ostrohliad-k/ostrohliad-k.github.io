<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сторінку не знайдено — Катя Острогляд</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#f8f5f0;--charcoal:#141414;--warm-gray:#6b6358;--accent:#a9824f}
body{font-family:'Montserrat',sans-serif;background:var(--cream);color:var(--charcoal);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem;-webkit-font-smoothing:antialiased}
.code{font-family:'Cormorant Garamond',serif;font-size:6rem;font-weight:300;color:var(--accent);line-height:1}
.title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:300;margin:0.6rem 0 1rem}
p{font-size:0.95rem;line-height:1.8;color:var(--warm-gray);max-width:420px;margin-bottom:2.2rem}
a.home{display:inline-block;padding:0.95rem 2.6rem;border:1px solid var(--charcoal);font-size:0.62rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--charcoal);text-decoration:none;transition:all 0.3s}
a.home:hover{background:var(--charcoal);color:#fff}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.3rem;letter-spacing:0.18em;text-transform:lowercase;color:var(--charcoal);text-decoration:none;margin-bottom:2.5rem}
</style>
</head>
<body>
<a class="logo" href="/">ostrohliad</a>
<div class="code">404</div>
<h1 class="title">Сторінку не знайдено</h1>
<p>Здається, такої сторінки не існує або її було переміщено. Повертайтеся на головну — там усі мої роботи.</p>
<a class="home" href="/">На головну</a>
</body>
</html>
